name: Weekly Data Pipeline

on:
  # 1. Runs automatically every Sunday at midnight UTC
  schedule:
    - cron: '0 0 * * 0' 
  
  # 2. Allows you to click a "Run workflow" button in GitHub for your presentation
  workflow_dispatch: 

jobs:
  update-database:
    runs-on: ubuntu-latest
    
    # 🔥 THIS IS THE FIX: Tell GitHub to run everything inside python-service
    defaults:
      run:
        working-directory: ./python-service
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 1. Collect New Jobs
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python src/collect_all_jobs.py

      - name: 2. Extract Skills with Groq AI
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python src/update_missing_skills.py

      - name: 3. Calculate Weekly Trends
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: python src/analytics/trend_calculator.py